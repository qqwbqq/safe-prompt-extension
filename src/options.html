<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Safe Prompt 设置</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="options-shell">
    <main class="settings-shell">
      <section class="soft-card compact-card">
        <div class="section-header">
          <div>
            <h1>Safe Prompt 设置</h1>
            <p>这里填写网关地址、模型名和 API Key。接口地址支持直接填写 `https://api.055298.xyz/v1` 这种基地址，不用再手动补 `/chat/completions`。</p>
          </div>
        </div>

        <div class="settings-grid">
          <label class="field full">
            <span>API 地址</span>
            <input id="apiBaseUrl" type="url" placeholder="https://api.055298.xyz/v1">
          </label>

          <label class="field">
            <span>模型名</span>
            <input id="model" type="text" placeholder="gpt-5.4">
          </label>

          <label class="field">
            <span>API Key</span>
            <input id="apiKey" type="password" placeholder="sk-...">
          </label>

          <label class="field">
            <span>界面语言</span>
            <select id="preferredLanguage">
              <option value="zh-CN">中文</option>
              <option value="en-US">English</option>
            </select>
          </label>

          <label class="field">
            <span>默认输出方向</span>
            <select id="defaultPromptTarget"></select>
          </label>

          <label class="field">
            <span>页面 HTML 上限</span>
            <input id="maxPageChars" type="number" min="4000" max="50000" step="1000">
          </label>

          <label class="field">
            <span>可见文本上限</span>
            <input id="maxVisibleTextChars" type="number" min="1000" max="20000" step="500">
          </label>

          <label class="field">
            <span>代码片段上限</span>
            <input id="maxCodeChars" type="number" min="4000" max="40000" step="1000">
          </label>

          <label class="field">
            <span>视频抽帧数量</span>
            <input id="videoFrameCount" type="number" min="2" max="8" step="1">
          </label>
        </div>

        <div class="settings-actions">
          <button id="saveBtn" class="primary-button" type="button">保存设置</button>
          <span id="saveStatus" class="status"></span>
        </div>
      </section>

      <section class="soft-card compact-card notice-card">
        <div class="section-header">
          <div>
            <h2>作者与使用说明</h2>
            <p>请在使用、分享或发布前先阅读以下信息。</p>
          </div>
        </div>

        <div class="notice-list">
          <p><strong>作者：</strong>safe_1ay：朱自清</p>
          <p><strong>用途限制：</strong>禁止商业使用，仅归为学习和个人使用。</p>
          <p><strong>提醒：</strong>若是找人买的，请迅速找对方退款。</p>
          <p><strong>联系：</strong>若有问题请联系 17773042433@163.com</p>
        </div>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
